<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A personal website created with HTML only and has links to multiple other pages like projects, articles and a contact page">
    <meta name="robots" content="index,follow">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Stack+Sans+Text:wght@200..700&display=swap" rel="stylesheet">
    <title>Contact</title>
</head>
<body>
    <header>
        <nav>
            <div>
                <h1 id="brand">Simron Sharma</h1>
            </div>
            <div id="hyperlinks">
                <a href="index.html">Homepage</a>
                <a href="project.html">Projects</a>
                <a href="article.html">Articles</a>
                <a href="contact.html">Contact</a>
            </div>
        </nav>
    </header>

    <main id="contact-main">
        <div id="box">
            <form action="/action">
                <div id="name">
                    <label for="name">Enter your name:</label>
                    <input type="text"  id="name"><br>
                </div>
                <div id="email">
                    <label for="email">Enter your email:</label>
                    <input type="email"  id="email"><br>
                </div>
                <div id="message">
                    <label for="message">Leave a message:</label> &nbsp;
                    <textarea id="message" rows="5"></textarea>
                 </div>
            </form>      
        </div>
    </main>
</body>
</html>
